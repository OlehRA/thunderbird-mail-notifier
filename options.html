<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 16px 20px;
      min-width: 320px;
      background: var(--in-content-page-background, #fff);
      color: var(--in-content-text-color, #0c0c0d);
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--in-content-border-color, #d7d7db);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      flex: 1;
      line-height: 1.4;
    }

    input[type=number] {
      width: 80px;
      padding: 4px 8px;
      border: 1px solid var(--in-content-border-color, #d7d7db);
      border-radius: 4px;
      font-size: 13px;
      background: var(--in-content-box-background, #fff);
      color: var(--in-content-text-color, #0c0c0d);
      text-align: center;
    }

    .hint {
      font-size: 11px;
      color: var(--in-content-deemphasized-text, #737373);
      margin-top: 2px;
    }

    .saved {
      display: none;
      color: green;
      font-size: 12px;
      margin-left: 8px;
    }

    button {
      margin-top: 16px;
      padding: 6px 16px;
      background: var(--in-content-primary-button-background, #0060df);
      color: var(--in-content-primary-button-text-color, #fff);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>

<h2 id="title">⚙️ Налаштування</h2>

<div class="row">
  <label>
    <span id="label-interval">Інтервал перевірки пошти</span>
    <div class="hint" id="hint-interval">Секунди. Рекомендовано: 30. Мін: 10, макс: 300.</div>
  </label>
  <input type="number" id="interval" min="10" max="300" value="30">
</div>

<div>
  <button id="save">💾 <span id="btn-save">Зберегти</span></button>
  <span class="saved" id="saved-msg">✓ <span id="saved-text">Збережено</span></span>
</div>

<script src="options.js"></script>
</body>
</html>
